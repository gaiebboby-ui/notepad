name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: cmd

jobs:
  build-x64:
    name: MSVC x64 (Windows 10/11)
    runs-on: windows-2022
    steps:
    - uses: actions/checkout@v4

    - name: Update Version Hash
      run: |
        "c:/Program Files/Git/usr/bin/sed" -i "s/^\(.\+\)[0-9a-f]\{8\}\(.\+\)$/\1%GITHUB_SHA:~0,8%\2/gm" ./src/VersionRev.h ./matepath/src/VersionRev.h

    - name: MSVC x64 Release
      run: |
        CALL "build\VisualStudio\build.bat" Build x64 Release 1
        CALL "locale\build.bat" Build x64 Release 1
        CALL "build\make_zip.bat" MSVC x64 Release Locale 1

    - name: Verify build output
      run: |
        IF NOT EXIST "build\bin\Release\x64\Notepad.exe" EXIT /B 1
        IF NOT EXIST "build\bin\Release\x64\matepath.exe" EXIT /B 1
        DIR /B "build\Notepad_i18n_x64_*.zip" >NUL 2>&1
        IF ERRORLEVEL 1 EXIT /B 1

    - uses: actions/upload-artifact@v4
      with:
        name: Notepad_x64
        path: build/Notepad_i18n_x64_*.zip
        retention-days: 14
