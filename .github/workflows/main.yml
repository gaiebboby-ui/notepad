name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: cmd

jobs:
  build-x64:
    name: MSVC x64 (Windows 10/11)
    runs-on: windows-2022
    steps:
    - uses: actions/checkout@v4

    - name: Update Version Hash
      run: |
        "c:/Program Files/Git/usr/bin/sed" -i "s/^\(.\+\)[0-9a-f]\{8\}\(.\+\)$/\1%GITHUB_SHA:~0,8%\2/gm" ./src/VersionRev.h ./matepath/src/VersionRev.h

    - name: MSVC x64 Release
      run: |
        CALL "build\VisualStudio\build.bat" Build x64 Release 1
        CALL "locale\build.bat" Build x64 Release 1
        CALL "build\make_zip.bat" MSVC x64 Release Locale 1

    - name: Verify build output
      run: |
        IF NOT EXIST "build\bin\Release\x64\Notepad.exe" EXIT /B 1
        IF NOT EXIST "build\bin\Release\x64\matepath.exe" EXIT /B 1
        DIR /B "build\Notepad_i18n_x64_v*.zip" >NUL 2>&1
        IF ERRORLEVEL 1 EXIT /B 1

    - uses: actions/upload-artifact@v4
      with:
        name: Notepad_x64
        path: build/Notepad_i18n_x64_v*.zip
        retention-days: 14
        if-no-files-found: error

    - name: Cache WebView2 Fixed Version cab
      id: cache-wv2
      uses: actions/cache@v4
      with:
        path: build/cache/webview2
        key: webview2-fixed-131.0.2903.146-x64-057976af0d822ebba15774916610b261ac5eb97f429e4c5ae4f5e9a621731994

    - name: Build with_WebView2 fat zip
      shell: pwsh
      env:
        WEBVIEW2_FIXED_CAB_URL: ${{ vars.WEBVIEW2_FIXED_CAB_URL || secrets.WEBVIEW2_FIXED_CAB_URL }}
      run: |
        $cabName = 'Microsoft.WebView2.FixedVersionRuntime.131.0.2903.146.x64.cab'
        $cacheCab = Join-Path 'build/cache/webview2' $cabName
        $haveCab = Test-Path $cacheCab
        $haveUrl = -not [string]::IsNullOrWhiteSpace($env:WEBVIEW2_FIXED_CAB_URL)
        if (-not $haveCab -and -not $haveUrl) {
          Write-Warning 'Skipping fat zip: set repository variable/secret WEBVIEW2_FIXED_CAB_URL to a Microsoft-acquired Fixed Version cab URL (see build/webview2-fixed-version.json).'
          exit 0
        }
        if ($haveCab) {
          $env:WEBVIEW2_FIXED_CAB = (Resolve-Path $cacheCab).Path
        }
        & powershell -NoProfile -ExecutionPolicy Bypass -File 'build/make_zip_webview2.ps1'
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
        $fat = Get-ChildItem 'build/Notepad_i18n_x64_with_WebView2_*.zip' -ErrorAction SilentlyContinue
        if (-not $fat) { throw 'Fat zip was not produced' }

    - uses: actions/upload-artifact@v4
      if: hashFiles('build/Notepad_i18n_x64_with_WebView2_*.zip') != ''
      with:
        name: Notepad_x64_with_WebView2
        path: build/Notepad_i18n_x64_with_WebView2_*.zip
        retention-days: 14
        if-no-files-found: warn
